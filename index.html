<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎾 テニスクイズ道場</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --court: #2d7a3a;
    --court-light: #3a9b4a;
    --line: #e8f5e9;
    --gold: #f5c518;
    --accent: #ff6b35;
    --bg: #0f1f0f;
    --card: #1a2e1a;
    --card2: #1f3520;
    --text: #e8f5e9;
    --muted: #8ab890;
    --correct: #4caf50;
    --wrong: #f44336;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ========== BG court lines ========== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(0deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ========== SCREENS ========== */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: block; }

  /* ========== TOP ========== */
  #screen-top {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }
  #screen-top.active { display: flex; }

  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-icon {
    font-size: clamp(48px, 10vw, 80px);
    display: block;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)}
  }
  .logo-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 8vw, 72px);
    letter-spacing: .08em;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 30px rgba(245,197,24,.4);
  }
  .logo-sub {
    font-size: clamp(12px, 2.5vw, 16px);
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: .15em;
  }

  .genre-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 860px;
    margin-bottom: 32px;
  }
  .genre-card {
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,.08);
    border-radius: var(--radius);
    padding: 22px 24px;
    cursor: pointer;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .genre-card:hover {
    transform: translateY(-3px);
    border-color: var(--gold);
    box-shadow: 0 8px 30px rgba(245,197,24,.15);
  }
  .genre-icon { font-size: 36px; flex-shrink: 0; }
  .genre-info .genre-name {
    font-size: 17px; font-weight: 700;
  }
  .genre-info .genre-count {
    font-size: 12px; color: var(--muted); margin-top: 3px;
  }

  .rules-box {
    background: var(--card);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: var(--radius);
    padding: 20px 28px;
    max-width: 540px;
    width: 100%;
    font-size: 14px;
    line-height: 1.9;
    color: var(--muted);
  }
  .rules-box h3 { color: var(--text); margin-bottom: 10px; font-size: 15px; }

  .btn-rank {
    margin-top: 24px;
    background: transparent;
    border: 1.5px solid var(--muted);
    color: var(--muted);
    border-radius: 99px;
    padding: 10px 28px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    transition: border-color .2s, color .2s;
  }
  .btn-rank:hover { border-color: var(--gold); color: var(--gold); }

  /* ========== RANKING ========== */
  #screen-rank {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px;
  }
  #screen-rank.active { display: flex; }
  .rank-title { font-size: 24px; font-weight: 900; margin-bottom: 20px; }
  .rank-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
  .rank-tab {
    background: var(--card); border: 1px solid rgba(255,255,255,.1);
    border-radius: 99px; padding: 7px 18px; cursor: pointer;
    font-size: 13px; font-family: inherit; color: var(--muted);
    transition: .2s;
  }
  .rank-tab.active { background: var(--gold); color: #000; font-weight: 700; border-color: var(--gold); }
  .rank-list { width: 100%; max-width: 520px; }
  .rank-item {
    background: var(--card); border-radius: 10px; padding: 14px 20px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 14px;
    border: 1px solid rgba(255,255,255,.06);
  }
  .rank-pos { font-size: 20px; font-weight: 900; width: 32px; color: var(--muted); }
  .rank-pos.gold { color: #ffd700; }
  .rank-pos.silver { color: #c0c0c0; }
  .rank-pos.bronze { color: #cd7f32; }
  .rank-name { flex: 1; font-weight: 700; }
  .rank-score { font-size: 18px; font-weight: 900; color: var(--gold); }
  .rank-empty { color: var(--muted); font-size: 14px; text-align: center; padding: 30px; }

  /* ========== INTRO ========== */
  #screen-intro {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }
  #screen-intro.active { display: flex; }
  .intro-icon { font-size: 60px; margin-bottom: 16px; }
  .intro-genre { font-size: clamp(22px, 5vw, 32px); font-weight: 900; margin-bottom: 8px; }
  .intro-count { color: var(--muted); margin-bottom: 36px; font-size: 14px; }
  .name-label { font-size: 14px; color: var(--muted); margin-bottom: 10px; }
  .name-input {
    background: var(--card); border: 1.5px solid rgba(255,255,255,.15);
    border-radius: 10px; color: var(--text);
    font-family: inherit; font-size: 18px; font-weight: 700;
    padding: 12px 20px; width: 280px; text-align: center;
    outline: none; transition: border-color .2s;
  }
  .name-input:focus { border-color: var(--gold); }
  .btn-start {
    margin-top: 28px;
    background: var(--gold); color: #000;
    border: none; border-radius: 99px;
    padding: 14px 48px; font-size: 18px; font-weight: 900;
    font-family: inherit; cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 20px rgba(245,197,24,.35);
  }
  .btn-start:hover { transform: scale(1.04); box-shadow: 0 6px 28px rgba(245,197,24,.5); }
  .btn-back {
    margin-top: 16px;
    background: transparent; border: none; color: var(--muted);
    font-family: inherit; font-size: 14px; cursor: pointer;
    text-decoration: underline;
  }

  /* ========== QUIZ ========== */
  #screen-quiz {
    min-height: 100vh;
    display: flex; flex-direction: column;
    padding: 0;
  }
  #screen-quiz.active { display: flex; }

  .quiz-header {
    background: var(--card);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .qh-progress { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .progress-bar-wrap {
    flex: 1; background: rgba(255,255,255,.1);
    border-radius: 99px; height: 6px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--gold);
    border-radius: 99px; transition: width .3s;
  }
  .qh-score { font-weight: 900; font-size: 16px; white-space: nowrap; }

  .timer-wrap {
    background: var(--card2);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .timer-label { font-size: 13px; color: var(--muted); }
  .timer-bar-wrap {
    flex: 1; background: rgba(255,255,255,.1);
    border-radius: 99px; height: 10px; overflow: hidden;
  }
  .timer-bar-fill {
    height: 100%; background: var(--correct);
    border-radius: 99px; transition: width .1s linear, background .3s;
  }
  .timer-bar-fill.warn { background: #ff9800; }
  .timer-bar-fill.danger { background: var(--wrong); }
  .timer-num {
    font-size: 20px; font-weight: 900;
    width: 42px; text-align: right;
  }

  .quiz-body {
    flex: 1; overflow-y: auto;
    padding: 24px 20px 32px;
    display: flex; flex-direction: column; align-items: center;
  }
  .q-type-badge {
    font-size: 11px; font-weight: 700; letter-spacing: .1em;
    border-radius: 99px; padding: 4px 14px;
    margin-bottom: 16px;
    display: inline-block;
  }
  .q-type-badge.multi { background: rgba(245,197,24,.15); color: var(--gold); }
  .q-type-badge.truefalse { background: rgba(76,175,80,.15); color: #81c784; }

  .q-text {
    font-size: clamp(16px, 4vw, 22px); font-weight: 700;
    text-align: center; line-height: 1.65;
    max-width: 680px;
    margin-bottom: 32px;
  }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%; max-width: 620px;
  }
  .choices.two-col { grid-template-columns: 1fr 1fr; }
  .choices.one-col  { grid-template-columns: 1fr; }

  .choice-btn {
    background: var(--card);
    border: 2px solid rgba(255,255,255,.1);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: clamp(14px, 3vw, 17px);
    font-weight: 700;
    padding: 18px 20px;
    cursor: pointer;
    text-align: center;
    line-height: 1.4;
    transition: border-color .15s, background .15s, transform .1s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: rgba(245,197,24,.08);
    transform: scale(1.02);
  }
  .choice-btn.correct { border-color: var(--correct) !important; background: rgba(76,175,80,.18) !important; }
  .choice-btn.wrong   { border-color: var(--wrong) !important; background: rgba(244,67,54,.18) !important; }
  .choice-btn:disabled { cursor: default; }

  .tf-btn { font-size: 28px !important; padding: 24px !important; }

  .feedback-bar {
    margin-top: 20px;
    max-width: 620px; width: 100%;
    border-radius: var(--radius);
    padding: 14px 20px;
    font-size: 15px; font-weight: 700;
    text-align: center;
    display: none;
  }
  .feedback-bar.show { display: block; }
  .feedback-bar.correct { background: rgba(76,175,80,.2); border: 1.5px solid var(--correct); color: #a5d6a7; }
  .feedback-bar.wrong   { background: rgba(244,67,54,.2);  border: 1.5px solid var(--wrong);   color: #ef9a9a; }

  .explanation-box {
    margin-top: 12px;
    max-width: 620px; width: 100%;
    background: rgba(255,255,255,.04);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 14px; line-height: 1.75;
    color: var(--muted);
    display: none;
  }
  .explanation-box.show { display: block; }

  .btn-next {
    margin-top: 20px;
    background: var(--court-light); color: #fff;
    border: none; border-radius: 99px;
    padding: 13px 40px; font-size: 16px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    display: none;
    transition: background .15s;
  }
  .btn-next.show { display: inline-block; }
  .btn-next:hover { background: var(--court); }

  /* ========== RESULT ========== */
  #screen-result {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px 60px;
    text-align: center;
  }
  #screen-result.active { display: flex; }

  .result-trophy { font-size: 64px; margin-bottom: 10px; animation: pop .4s ease-out; }
  @keyframes pop { 0%{transform:scale(0)} 80%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .result-genre-name { font-size: 14px; color: var(--muted); margin-bottom: 20px; }

  .score-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 15vw, 120px);
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 40px rgba(245,197,24,.4);
  }
  .score-label { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

  .stats-row {
    display: flex; gap: 16px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 32px;
  }
  .stat-card {
    background: var(--card); border-radius: 12px;
    padding: 16px 24px; min-width: 110px;
    border: 1px solid rgba(255,255,255,.07);
  }
  .stat-val { font-size: 28px; font-weight: 900; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .stat-val.gold { color: var(--gold); }
  .stat-val.green { color: var(--correct); }

  .wrong-list { width: 100%; max-width: 620px; text-align: left; margin-bottom: 32px; }
  .wrong-title { font-size: 15px; font-weight: 700; margin-bottom: 12px;
    color: var(--accent); border-bottom: 1px solid rgba(255,255,255,.1); padding-bottom: 8px; }
  .wrong-item {
    background: var(--card);
    border-radius: 10px; padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 3px solid var(--wrong);
    font-size: 14px; line-height: 1.7;
  }
  .wrong-item .wi-q { font-weight: 700; margin-bottom: 6px; }
  .wrong-item .wi-a { color: var(--correct); font-weight: 700; }
  .wrong-item .wi-exp { color: var(--muted); font-size: 13px; margin-top: 4px; }

  .result-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn-retry {
    background: var(--gold); color: #000;
    border: none; border-radius: 99px;
    padding: 13px 40px; font-size: 16px; font-weight: 900;
    font-family: inherit; cursor: pointer;
    transition: transform .15s;
  }
  .btn-retry:hover { transform: scale(1.04); }
  .btn-top-link {
    background: transparent; border: 1.5px solid var(--muted);
    color: var(--muted); border-radius: 99px;
    padding: 13px 32px; font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    transition: .2s;
  }
  .btn-top-link:hover { border-color: var(--text); color: var(--text); }

  /* ========== TOAST ========== */
  #toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card2);
    border-radius: 99px; padding: 10px 24px;
    font-size: 15px; font-weight: 700;
    opacity: 0; transition: .3s; z-index: 9999;
    pointer-events: none; white-space: nowrap;
    border: 1px solid rgba(255,255,255,.15);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media(max-width:480px) {
    .genre-grid { grid-template-columns: 1fr; }
    .choices.two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ===== TOAST ===== -->
<div id="toast"></div>

<!-- ===== TOP ===== -->
<section id="screen-top" class="screen active">
  <div class="logo-area">
    <span class="logo-icon">🎾</span>
    <div class="logo-title">TENNIS QUIZ</div>
    <div class="logo-sub">テニスクイズ道場</div>
  </div>

  <div class="genre-grid" id="genre-grid"></div>

  <div class="rules-box">
    <h3>📋 ルール</h3>
    制限時間：120秒 ／ 各ジャンル10問ランダム出題<br>
    ✅ 正解 → <strong style="color:var(--gold)">+10点</strong> ＋ 時間+5秒<br>
    ❌ 不正解 → 減点なし ＋ 時間−5秒のペナルティ<br>
    🏆 残り時間がそのままボーナス点に加算！<br>
    【4択】と【○×】がランダムにミックスされます
  </div>

  <button class="btn-rank" onclick="showScreen('rank')">🏆 スコアランキングを見る</button>
</section>

<!-- ===== RANKING ===== -->
<section id="screen-rank" class="screen">
  <div class="rank-title">🏆 スコアランキング</div>
  <div class="rank-tabs" id="rank-tabs"></div>
  <div class="rank-list" id="rank-list"></div>
  <button class="btn-rank" style="margin-top:20px" onclick="showScreen('top')">← トップへ</button>
</section>

<!-- ===== INTRO ===== -->
<section id="screen-intro" class="screen">
  <div class="intro-icon" id="intro-icon"></div>
  <div class="intro-genre" id="intro-genre"></div>
  <div class="intro-count" id="intro-count"></div>
  <div class="name-label">プレーヤー名を入力</div>
  <input class="name-input" id="player-name" type="text" placeholder="あなたの名前" maxlength="12">
  <button class="btn-start" onclick="startQuiz()">スタート ▶</button>
  <button class="btn-back" onclick="showScreen('top')">← 戻る</button>
</section>

<!-- ===== QUIZ ===== -->
<section id="screen-quiz" class="screen">
  <div class="quiz-header">
    <span class="qh-progress" id="qh-progress">Q1 / 10</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <span class="qh-score" id="qh-score">0 pt</span>
  </div>
  <div class="timer-wrap">
    <span class="timer-label">残り</span>
    <div class="timer-bar-wrap"><div class="timer-bar-fill" id="timer-bar"></div></div>
    <span class="timer-num" id="timer-num">120</span>
    <span style="font-size:13px;color:var(--muted)">秒</span>
  </div>
  <div class="quiz-body">
    <span class="q-type-badge" id="q-type-badge">4択</span>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback-bar" id="feedback-bar"></div>
    <div class="explanation-box" id="explanation-box"></div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題へ →</button>
  </div>
</section>

<!-- ===== RESULT ===== -->
<section id="screen-result" class="screen">
  <div class="result-trophy" id="result-trophy">🏆</div>
  <div class="result-genre-name" id="result-genre-name"></div>
  <div class="score-big" id="score-big">0</div>
  <div class="score-label">TOTAL SCORE</div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val green" id="res-correct">0</div><div class="stat-lbl">正解数</div></div>
    <div class="stat-card"><div class="stat-val" id="res-wrong">0</div><div class="stat-lbl">不正解数</div></div>
    <div class="stat-card"><div class="stat-val gold" id="res-bonus">+0</div><div class="stat-lbl">時間ボーナス</div></div>
  </div>
  <div class="wrong-list" id="wrong-list"></div>
  <div class="result-btns">
    <button class="btn-retry" onclick="retryQuiz()">もう一度挑戦</button>
    <button class="btn-top-link" onclick="showScreen('top')">← トップへ</button>
  </div>
</section>

<script>
/* ===================== QUIZ DATA ===================== */
const GENRES = [
  {
    id: 'rules',
    name: 'ルール・基本知識',
    icon: '📜',
    questions: [
      // ○×
      {type:'tf', q:'テニスのサービスはデュースサイドから始まる。', a:true, exp:'最初のサービスは右側（デュースサイド）から始まります。'},
      {type:'tf', q:'デュースとは3-3（40-40）のスコア状態のことである。', a:true, exp:'デュースは40-40の同点状態。その後2ポイント連続取得で勝利です。'},
      {type:'tf', q:'フットフォルトはサービス失敗とはみなされない。', a:false, exp:'フットフォルトはフォルトとして扱われます。'},
      {type:'tf', q:'タイブレークでは7ポイント先取した方がセットを取る。', a:true, exp:'通常タイブレークは7ポイント先取（2ポイント差必要）です。'},
      {type:'tf', q:'ネットに触れたサービスがサービスボックスに入った場合、ノーカウントになる。', a:true, exp:'これを「レット」と言い、サービスをやり直します。'},
      {type:'tf', q:'グランドスラムの試合では男子は5セットマッチである。', a:true, exp:'男子グランドスラムは5セットマッチ。女子は3セットマッチです。'},
      {type:'tf', q:'コートエンドの選択は試合開始前のトスで決定する。', a:true, exp:'トスに勝った選手がサービス・コートエンド・レシーブを選択できます。'},
      {type:'tf', q:'アウトボールをレシーバーが打ち返した場合、ポイントはサーバーのものになる。', a:false, exp:'レシーバーが打ち返してからアウトと判断された場合、打ち返した時点でボールを打った側が有効プレーとなります。'},
      {type:'tf', q:'ダブルスでは両プレーヤーが交互にサービスを行う。', a:true, exp:'ダブルスでは各セット毎に、4人が順番にサービスを行います。'},

/* ===================== STATE ===================== */
let currentGenre = null;
let currentQuestions = [];
let currentIdx = 0;
let score = 0;
let correctCount = 0;
let wrongItems = [];
let timerSec = 120;
let timerInterval = null;
let playerName = '';
let answered = false;

/* ===================== SCREENS ===================== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  if (id === 'rank') renderRanking();
}

/* ===================== GENRE CARDS ===================== */
function buildGenreGrid() {
  const grid = document.getElementById('genre-grid');
  grid.innerHTML = '';
  GENRES.forEach(g => {
    const card = document.createElement('div');
    card.className = 'genre-card';
    card.innerHTML = `<span class="genre-icon">${g.icon}</span>
      <div class="genre-info">
        <div class="genre-name">${g.name}</div>
        <div class="genre-count">全${g.questions.length}問収録 ／ 10問ランダム出題</div>
      </div>`;
    card.onclick = () => openIntro(g.id);
    grid.appendChild(card);
  });
}

function openIntro(genreId) {
  currentGenre = GENRES.find(g => g.id === genreId);
  document.getElementById('intro-icon').textContent = currentGenre.icon;
  document.getElementById('intro-genre').textContent = currentGenre.name;
  document.getElementById('intro-count').textContent = `全${currentGenre.questions.length}問収録 ／ 10問ランダム出題`;
  document.getElementById('player-name').value = playerName;
  showScreen('intro');
}

/* ===================== START ===================== */
function startQuiz() {
  playerName = document.getElementById('player-name').value.trim() || 'ゲスト';
  // Shuffle & pick 10
  const pool = [...currentGenre.questions].sort(() => Math.random() - .5).slice(0, 10);
  currentQuestions = pool;
  currentIdx = 0;
  score = 0;
  correctCount = 0;
  wrongItems = [];
  timerSec = 120;
  answered = false;
  showScreen('quiz');
  renderQuestion();
  startTimer();
}

/* ===================== TIMER ===================== */
function startTimer() {
  clearInterval(timerInterval);
  updateTimerUI();
  timerInterval = setInterval(() => {
    timerSec--;
    updateTimerUI();
    if (timerSec <= 0) { timerSec = 0; updateTimerUI(); clearInterval(timerInterval); endQuiz(); }
  }, 1000);
}

function updateTimerUI() {
  const num = document.getElementById('timer-num');
  const bar = document.getElementById('timer-bar');
  num.textContent = timerSec;
  const pct = (timerSec / 120) * 100;
  bar.style.width = pct + '%';
  bar.className = 'timer-bar-fill' + (timerSec <= 15 ? ' danger' : timerSec <= 40 ? ' warn' : '');
  num.style.color = timerSec <= 15 ? 'var(--wrong)' : 'var(--text)';
}

/* ===================== QUESTION ===================== */
function renderQuestion() {
  const q = currentQuestions[currentIdx];
  answered = false;

  document.getElementById('qh-progress').textContent = `Q${currentIdx+1} / 10`;
  document.getElementById('progress-bar').style.width = ((currentIdx) / 10 * 100) + '%';
  document.getElementById('qh-score').textContent = score + ' pt';

  const badge = document.getElementById('q-type-badge');
  badge.textContent = q.type === 'mc' ? '4択' : '○×';
  badge.className = 'q-type-badge ' + (q.type === 'mc' ? 'multi' : 'truefalse');

  document.getElementById('q-text').textContent = q.q;

  const choices = document.getElementById('choices');
  choices.innerHTML = '';
  choices.className = 'choices';

  if (q.type === 'mc') {
    choices.classList.add('two-col');
    const labels = ['A','B','C','D'];
    q.choices.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span style="color:var(--gold);min-width:20px">${labels[i]}</span>${c}`;
      btn.onclick = () => selectAnswer(i);
      choices.appendChild(btn);
    });
  } else {
    choices.classList.add('two-col');
    ['⭕ 正しい','❌ 間違い'].forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn tf-btn';
      btn.textContent = c;
      btn.onclick = () => selectAnswer(i === 0);
      choices.appendChild(btn);
    });
  }

  document.getElementById('feedback-bar').className = 'feedback-bar';
  document.getElementById('feedback-bar').textContent = '';
  document.getElementById('explanation-box').className = 'explanation-box';
  document.getElementById('explanation-box').textContent = '';
  document.getElementById('btn-next').className = 'btn-next';
}

/* ===================== ANSWER ===================== */
function selectAnswer(selected) {
  if (answered) return;
  answered = true;

  const q = currentQuestions[currentIdx];
  const correct = q.a;
  const isCorrect = selected === correct;

  const btns = document.querySelectorAll('.choice-btn');

  if (q.type === 'mc') {
    btns.forEach((b, i) => {
      b.disabled = true;
      if (i === correct) b.classList.add('correct');
      else if (i === selected && !isCorrect) b.classList.add('wrong');
    });
  } else {
    btns.forEach((b, i) => {
      b.disabled = true;
      const val = i === 0; // true/false
      if (val === correct) b.classList.add('correct');
      else if (val === selected && !isCorrect) b.classList.add('wrong');
    });
  }

  const fb = document.getElementById('feedback-bar');
  const exp = document.getElementById('explanation-box');

  if (isCorrect) {
    score += 10;
    timerSec = Math.min(timerSec + 5, 240);
    correctCount++;
    fb.textContent = '✅ 正解！ ＋5秒';
    fb.className = 'feedback-bar show correct';
    showToast('✅ 正解！ ＋5秒', 1400);
  } else {
    timerSec = Math.max(timerSec - 5, 1);
    let correctLabel = '';
    if (q.type === 'mc') {
      correctLabel = q.choices[correct];
    } else {
      correctLabel = correct ? '○（正しい）' : '×（間違い）';
    }
    fb.textContent = `❌ 正解は「${correctLabel}」（−5秒）`;
    fb.className = 'feedback-bar show wrong';
    wrongItems.push({ q: q.q, a: correctLabel, exp: q.exp || '' });
    showToast('❌ −5秒', 1400);
  }

  updateTimerUI();
  document.getElementById('qh-score').textContent = score + ' pt';

  if (q.exp) {
    exp.textContent = '💬 ' + q.exp;
    exp.className = 'explanation-box show';
  }

  document.getElementById('btn-next').className = 'btn-next show';
}

/* ===================== NEXT ===================== */
function nextQuestion() {
  currentIdx++;
  if (currentIdx >= 10) {
    endQuiz();
  } else {
    renderQuestion();
  }
}

/* ===================== END ===================== */
function endQuiz() {
  clearInterval(timerInterval);
  const bonus = Math.max(timerSec, 0);
  const total = score + bonus;

  saveScore(currentGenre.id, playerName, total);

  document.getElementById('result-trophy').textContent = total >= 150 ? '🥇' : total >= 100 ? '🥈' : '🥉';
  document.getElementById('result-genre-name').textContent = currentGenre.icon + ' ' + currentGenre.name;
  document.getElementById('score-big').textContent = total;
  document.getElementById('res-correct').textContent = correctCount;
  document.getElementById('res-wrong').textContent = (10 - correctCount);
  document.getElementById('res-bonus').textContent = '+' + bonus;

  const wl = document.getElementById('wrong-list');
  if (wrongItems.length > 0) {
    wl.innerHTML = `<div class="wrong-title">❌ 間違えた問題 (${wrongItems.length}問)</div>` +
      wrongItems.map(w => `
        <div class="wrong-item">
          <div class="wi-q">Q. ${w.q}</div>
          <div class="wi-a">✅ 正解：${w.a}</div>
          ${w.exp ? `<div class="wi-exp">💬 ${w.exp}</div>` : ''}
        </div>`).join('');
  } else {
    wl.innerHTML = '<div style="color:var(--correct);font-weight:700;text-align:center;padding:20px">🎉 全問正解！</div>';
  }

  showScreen('result');
}

function retryQuiz() {
  startQuiz();
}

/* ===================== RANKING ===================== */
function saveScore(genreId, name, score) {
  const key = 'tennis_rank_' + genreId;
  let list = JSON.parse(localStorage.getItem(key) || '[]');
  list.push({ name, score, date: new Date().toLocaleDateString('ja') });
  list.sort((a, b) => b.score - a.score);
  list = list.slice(0, 10);
  localStorage.setItem(key, JSON.stringify(list));
}

function renderRanking() {
  const tabs = document.getElementById('rank-tabs');
  tabs.innerHTML = '';
  GENRES.forEach((g, i) => {
    const btn = document.createElement('button');
    btn.className = 'rank-tab' + (i === 0 ? ' active' : '');
    btn.textContent = g.icon + ' ' + g.name;
    btn.onclick = () => {
      document.querySelectorAll('.rank-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderRankList(g.id);
    };
    tabs.appendChild(btn);
  });
  renderRankList(GENRES[0].id);
}

function renderRankList(genreId) {
  const list = JSON.parse(localStorage.getItem('tennis_rank_' + genreId) || '[]');
  const el = document.getElementById('rank-list');
  if (list.length === 0) {
    el.innerHTML = '<div class="rank-empty">まだ記録がありません</div>';
    return;
  }
  const medals = ['gold','silver','bronze'];
  el.innerHTML = list.map((r, i) => `
    <div class="rank-item">
      <span class="rank-pos ${medals[i]||''}">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1)}</span>
      <span class="rank-name">${r.name}</span>
      <span style="font-size:12px;color:var(--muted);margin-right:8px">${r.date}</span>
      <span class="rank-score">${r.score}</span>
    </div>`).join('');
}

/* ===================== TOAST ===================== */
function showToast(msg, ms = 1800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

/* ===================== INIT ===================== */
buildGenreGrid();
</script>
